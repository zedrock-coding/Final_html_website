<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Last HTML website</title>
</head>
<body class="bg-gray-100 dark:bg-gray-900 xl:pb-10 lg:pb-6 md:pb-2 ">
    <header>
        <nav class="relative flex w-full flex-nowrap items-center bg-zinc-50 py-2 text-neutral-600 shadow-dark-mild hover:text-neutral-700 focus:text-neutral-700 dark:bg-neutral-700 lg:flex-wrap lg:py-4" data-twe-navbar-ref>
           <div class="flex w-full flex-wrap items-center justify-center px-3">
            <div>
                <a href="#" class="text-xl text-black dark:text-white">My Website</a>
            </div>
           </div> 
        </nav>
    </header>    
    <main class="grid grid-cols-1 gap-y-10 p-2 md:p-8">
        <!-- Welcome section-->
        <section class="container mx-auto px-4 py-8 bg-white-50 dark:bg-gray-800 rounded-lg">
            <h1 class="xl:text-5xl lg:text-4xl md:text-3xl text-2xl font-bold text-center text-gray-800 dark:text-gray-300 ">Welcome to my last html website</h1>
            <p class="text-lg md:text-xl lg:text-2xl text-gray-600 dark:text-gray-400 text-center mt-4">I am going to give my all and present while also learning the best things i can with html, tailwind css and javascript.</p>
        </section>
        <!-- Image Slideshow section-->
        <section class="container mx-auto px-4 py-8 bg-white-50 dark:bg-gray-800 rounded-lg md:px-6 md:py-12">
            <h2 class="text-3xl text-bold text-center dark:text-gray-400">A slideshow for showing simple js</h2>
            <div class="relative" data-slide-motion="slide">
              <div class="slideshow-container md-14 grid touch-manupulation grid-flow-col scroll-smooth snap-x snap-mandatory overflow-x-hidden" style= "grid-auto-columns: 100% !important;" data-slide-motion="">
                <div class="w-full snap-start p-6 duration-1000 ease-in-out">
                    <img src="media/porche.jpg" alt="porche" class="w-full h-auto rounded-lg">
                </div>
                <div class="w-full snap-start p-6 duration-1000 ease-in-out">
                    <img src="media/brabus.jpg" alt="brabus" class="w-full h-auto rounded-lg">
                </div>
                <div class="w-full snap-start p-6 duration-1000 ease-in-out">
                    <img src="media/corrvette.jpg" alt="corrvette" class="w-full h-auto rounded-lg">
                </div> 
                    <div class="w-full snap-start p-6 duration-1000 ease-in-out">
                        <img src="media/mclaren.jpeg" alt="mclaren" class="w-full h-auto rounded-lg">
                    </div>
                    <div class="w-full snap-start p-6 duration-1000 ease-in-out">
                        <img src="media/jesko.jpg" alt="jesko" class="w-full h-auto rounded-lg">
                    </div>   
                </div>
                <button type="button" class="absolute top-1/2 left-0 transform -translate-y-1/2 bg-gray-700 hover:bg-gray-900 hover:-left-1 transition-all duration-300 ease-in-out text-white p-2 rounded-full" id="prevBtn">
                    &#10094;
                </button>
                <button type="button" class="absolute top-1/2 right-0 transform -translate-y-1/2 bg-gray-700 hover:bg-gray-900 hover:-right-1 transition-all duration-300 ease-in-out text-white p-2 rounded-full" id="nextBtn">
                    &#10095;
                </button>
            </div>
            
        </section>
        <!-- Form section-->
        <section class="container mx-auto px-4 py-8 bg-white-50 dark:bg-gray-800 rounded-lg">
            <h2 class="text-3xl text-bold text-center dark:text-gray-400">A simple form with validation.</h2>
            <div class="flex justify-center mt-4 p-2 rounded-lg shadow-lg align-items-center">
                <form id="form" class="text-2xl font-base text-gray-300 grid grid-cols-1 gap-y-3 w-full md:w-1/2">

                    <!--Username label and input-->
                    <div class="grid grid-cols-2 gap-x-4">
                        <label for="username" class="rounded-lg bg-mist-700 text-center font-bold" >Username:</label>
                    <input type="text" name="username" id="username" class="border-0 rounded-lg bg-mist-700 focus:ring-0 focus:border-b-2 focus:bg-mist-700 focus:border-black-500 py-4 px-0 mb-4" required>
                    <p class="error hidden text-center text-base text-red-500 py-2" id="username-error"></p>
                    </div>
                    
                    <!--Email label and input-->
                    <div class="grid grid-cols-2 gap-x-4">
                        <label for="email" class="rounded-lg bg-mist-700 text-center font-bold">Email:</label>
                    <input type="text" id="email" name="email" class="border-0 rounded-lg bg-mist-700 focus:ring-0 focus:border-b-2 focus:bg-mist-700 focus:border-black-500 py-4 px-0 mb-4" required>
                    <p class="error hidden text-center text-base text-red-500 py-2" id="email-error"></p>
                    </div>
                    
                    <!--Password label and input-->
                    <div class="grid grid-cols-2 gap-x-4">
                        <label for="password" class="rounded-lg bg-mist-700 text-center font-bold">Password:</label>
                    <input type="password" id="password" name="password" class="border-0 rounded-lg bg-mist-700 focus:ring-0 focus:border-b-2 focus:bg-mist-700 focus:border-black-500 py-4 px-0 mb-4" required>
                    <p class="error hidden text-center text-base text-red-500 py-2" id="password-error"></p>
                    </div>

                    <!--Recheck the Password-->
                    <div class="grid grid-cols-2 gap-x-4">
                        <label for="confirm-password" class="rounded-lg bg-mist-700 text-center font-bold">Confirm Password:</label>
                        <input type="password" id="confirm-password" name="confirm-password" class="border-0 rounded-lg bg-mist-700 focus:ring-0 focus:border-b-2 focus:bg-mist-700 focus:border-black-500 py-4 px-0 mb-4" required>
                        <p class="error hidden text-center text-base text-red-500 py-2" id="confirm-password-error"></p>
                    </div>

                    <button id="formbtn" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-full" >Submit</button>
                </form>
                
            </div>
        </section>
        <!-- Game section-->
        <section class="container mx-auto px-4 py-8 bg-white-50 dark:bg-gray-800 rounded-lg">
            <h2 class="text-3xl text-bold text-center dark:text-gray-400">A simple game</h2>
            <div class="flex justify-center mt-4 p-2 rounded-lg shadow-lg align-items-center">
                <div class="w-full md:w-1/2 items-center flex flex-col gap-y-4 ">
                    <div class="flex w-full justify-center gap-x-8 px-8">
                        <h3 class="text-3xl font-bold text-gray-300 border-3 p-1 border-red-500 rounded-xl">Score: <span id="score">0</span></h3>
                        <h3 class="text-3xl font-bold text-gray-300 border-3 p-1 border-red-500 rounded-xl">Round: <span id="round">0</span></h3>
                    </div>
                    <div id="gameCanvas" class="w-full h-auto rounded-lg bg-gray-800 border-6 border-gray-600">
                <div class="flex items-center justify-center p-6 min-h-[20rem]" id="main-frame">
                    <button class="bg-zinc-500 hover:bg-zinc-800 text-white font-bold py-6 px-12 rounded-full" id="start-game">Start Game</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
    <script src="game.js"></script>
</body>
</html>
