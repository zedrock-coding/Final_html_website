<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Last HTML website</title>
</head>
<body class="bg-gray-100 dark:bg-gray-900 pb-10">
    <header>
        <nav class="relative flex w-full flex-nowrap items-center justify-between bg-zinc-50 py-2 text-neutral-500 shadow-dark-mild hover:text-neutral-700 focus:text-neutral-700 dark:bg-neutral-700 lg:flex-wrap lg:justify-start lg:py-4" data-twe-navbar-ref>
           <div class="flex w-full flex-wrap justify-between px-3">
            <div class="ms-2">
                <a href="#" class="text-xl text-black dark:text-white">My Website</a>
            </div>
           </div> 
        </nav>
    </header>    
    <main class="grid grid-cols-1 gap-y-10 p-2" >
        <section class="container mx-auto px-4 py-8 bg-white-50 dark:bg-gray-800 rounded-lg">
            <h1 class="text-4xl font-bold text-center text-gray-800 dark:text-gray-300">Welcome to my last html website</h1>
            <p class="text-lg text-gray-600 dark:text-gray-400 text-center mt-4">I am going to give my all and present while also learning the best things i can with html, tailwind css and javascript.</p>
        </section>
        <section class="container mx-auto px-4 py-8 bg-white-50 dark:bg-gray-800 rounded-lg">
            <h2 class="text-3xl text-bold text-center dark:text-gray-400">A slideshow for showing simple js</h2>
            <div class="relative" data-slide-motion="slide">
              <div class="slideshow-container md-14 grid touch-manupulation grid-flow-col scroll-smooth snap-x snap-mandatory overflow-x-hidden" style= "grid-auto-columns: 100% !important;" data-slide-motion="">
                <div class="w-full snap-start p-6 duration-1000 ease-in-out">
                    <img src="media/porche.jpg" alt="porche" class="w-full h-auto rounded-lg">
                </div>
                <div class="w-full snap-start p-6 duration-1000 ease-in-out">
                    <img src="media/brabus.jpg" alt="brabus" class="w-full h-auto rounded-lg">
                </div>
                <div class="w-full snap-start p-6 duration-1000 ease-in-out">
                    <img src="media/corrvette.jpg" alt="corrvette" class="w-full h-auto rounded-lg">
                </div> 
                    <div class="w-full snap-start p-6 duration-1000 ease-in-out">
                        <img src="media/mclaren.jpeg" alt="mclaren" class="w-full h-auto rounded-lg">
                    </div>
                    <div class="w-full snap-start p-6 duration-1000 ease-in-out">
                        <img src="media/jesko.jpg" alt="jesko" class="w-full h-auto rounded-lg">
                    </div>   
                </div>                
            </div>
            
        </section>
        <section class="container mx-auto px-4 py-8 bg-white-50 dark:bg-gray-800 rounded-lg">
            <h2 class="text-3xl text-bold text-center dark:text-gray-400">A simple form with validation.</h2>
            <div class="flex justify-center mt-4  p-6 rounded-lg shadow-lg align-items-center">
                <form class="text-2xl font-base text-gray-300 grid grid-cols-1 gap-y-3 w-full md:w-1/2">

                    <!--Username label and input-->
                    <div class="grid grid-cols-2 gap-x-4">
                        <label for="username" class="rounded-lg bg-mist-700 text-center text-bold" >Username:</label>
                    <input type="text" name="username" id="username" class="border-0 rounded-lg bg-mist-700 focus:ring-0 focus:border-b-2 focus:border-black-500 p-[1rem 0] m-[0 0 1rem 0]" required>
                    </div>
                    
                    <!--Email label and input-->
                    <div class="grid grid-cols-2 gap-x-4">
                        <label for="email" class="rounded-lg bg-mist-700 text-center text-bold">Email:</label>
                    <input type="text" id="email" name="email" class="border-0 rounded-lg bg-mist-700 focus:ring-0 focus:border-b-2 focus:border-black-500 p-[1rem 0] m-[0 0 1rem 0]" required>
                    </div>
                    
                    <!--Password label and input-->
                    <div class="grid grid-cols-2 gap-x-4">
                        <label for="password" class="rounded-lg bg-mist-700 text-center text-bold">Password:</label>
                    <input type="password" id="password" name="password" class="border-0 rounded-lg bg-mist-700 focus:ring-0 focus:border-b-2 focus:border-black-500 p-[1rem 0] m-[0 0 1rem 0]" required>
                    </div>

                    <!--Recheck the Password-->
                    <div class="grid grid-cols-2 gap-x-4">
                        <label for="confirm-password" class="rounded-lg bg-mist-700 text-center text-bold">Confirm Password:</label>
                        <input type="password" id="confirm-password" name="confirm-password" class="border-0 rounded-lg bg-mist-700 focus:ring-0 focus:border-b-2 focus:border-black-500 p-[1rem 0] m-[0 0 1rem 0]" required>
                    </div>

                    <button id="formbtn" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-full">Submit</button>
                </form>
                
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
